name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

# ─────────────────────────────────────────────────────────────
# JOB 1 — Build Docker Image
# ─────────────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build hardened nginx image
        run: |
          docker build \
            -t nginx-hardened:${{ github.sha }} \
            -t nginx-hardened:latest \
            ./docker/nginx-hardened/

      - name: Verify image was built
        run: docker images | grep nginx-hardened

# ─────────────────────────────────────────────────────────────
# JOB 2 — Security Scan with Trivy
# ─────────────────────────────────────────────────────────────
  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image for scanning
        run: |
          docker build \
            -t nginx-hardened:${{ github.sha }} \
            ./docker/nginx-hardened/

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nginx-hardened:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          scanners: vuln

      - name: Trivy scan passed
        run: echo "No CRITICAL or HIGH vulnerabilities found"

# ─────────────────────────────────────────────────────────────
# JOB 3 — Terraform Validate
# ─────────────────────────────────────────────────────────────
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: trivy-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.9

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: ./terraform/phase2-docker

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./terraform/phase2-docker

      - name: Terraform Format Check
        run: terraform fmt -check
        working-directory: ./terraform/phase2-docker
