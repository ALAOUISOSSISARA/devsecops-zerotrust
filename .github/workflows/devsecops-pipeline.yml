name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

# ─────────────────────────────────────────────────────────────
# JOB 1 — Build Docker Image
# ─────────────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build hardened nginx image
        run: |
          docker build \
            -t nginx-hardened:${{ github.sha }} \
            -t nginx-hardened:latest \
            ./docker/nginx-hardened/

      - name: Verify image was built
        run: docker images | grep nginx-hardened

# ─────────────────────────────────────────────────────────────
# JOB 2 — Security Scan with Trivy
# ─────────────────────────────────────────────────────────────
  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image for scanning
        run: |
          docker build \
            -t nginx-hardened:${{ github.sha }} \
            ./docker/nginx-hardened/

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nginx-hardened:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          scanners: vuln

      - name: Trivy scan passed
        run: echo "No CRITICAL or HIGH vulnerabilities found"

# ─────────────────────────────────────────────────────────────
# JOB 3 — Terraform Validate
# ─────────────────────────────────────────────────────────────
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: trivy-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.9

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: ./terraform/phase2-docker

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./terraform/phase2-docker

      - name: Terraform Format Check
        run: terraform fmt -check
        working-directory: ./terraform/phase2-docker

# ─────────────────────────────────────────────────────────────
# JOB 4 — Semgrep SAST (Static Analysis)
# ─────────────────────────────────────────────────────────────
  semgrep:
    name: Semgrep SAST Scan
    runs-on: ubuntu-latest
    needs: terraform-validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/dockerfile
            p/terraform
            p/secrets

# ─────────────────────────────────────────────────────────────
# JOB 5 — Gitleaks (Secrets Detection)
# ─────────────────────────────────────────────────────────────
  gitleaks:
    name: Gitleaks Secrets Scan
    runs-on: ubuntu-latest
    needs: semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ─────────────────────────────────────────────────────────────
# JOB 6 — OPA/Conftest (Policy as Code)
# ─────────────────────────────────────────────────────────────
  conftest:
    name: OPA Conftest Policy Check
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Conftest
        run: |
          wget https://github.com/open-policy-agent/conftest/releases/download/v0.46.0/conftest_0.46.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.46.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/

      - name: Run Conftest on Terraform
        run: conftest test terraform/phase2-docker/main.tf --policy policy/
